databases:
  - name: swadeschatbot-db
    databaseName: customer_support
    user: customer_support

services:
  - type: web
    name: swadeschatbot
    runtime: node
    region: oregon
    autoDeploy: true
    buildCommand: npm install && npm run build --workspace @customer-support/web
    startCommand: npm run start --workspace @customer-support/server
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swadeschatbot-db
          property: connectionString
      - key: PORT
        value: 10000
